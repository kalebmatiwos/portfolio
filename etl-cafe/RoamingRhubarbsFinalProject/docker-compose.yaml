services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/db-scripts/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql

  adminer:
    image: adminer

    ports:
      - "8080:8080"

    depends_on:
      - db

  etl:
    build: .

    env_file:
      - .env

    depends_on:
      - db

volumes:
  postgres_data:
  #